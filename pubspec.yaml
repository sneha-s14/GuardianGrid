name: guardian_grid
description: Real-time urban safety intelligence platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_heatmap: ^0.0.7
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  http: ^1.2.1
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
